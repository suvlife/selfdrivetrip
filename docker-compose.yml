version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: selfdrivetrip-db
    environment:
      POSTGRES_USER: selfdrivetrip
      POSTGRES_PASSWORD: password
      POSTGRES_DB: selfdrivetrip
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U selfdrivetrip"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opt_web

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: selfdrivetrip-backend
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - opt_web
    labels:
      - "traefik.enable=false"

volumes:
  postgres_data:

networks:
  opt_web:
    external: true
